# StyleJudge v3 — Full Study Configuration
# Generator: DeepSeek-V3 (deepseek-chat) for all construction; DeepSeek-R1 for natural-abstract
# Judges: Claude Sonnet 4.6 (primary), GPT-4o (cross-family), Llama 3.3 70B (open-source)
# Modes: Artificial (V-simple/V-abstract rewrites) + Natural (DeepSeek-V3 vs R1 native outputs)

experiment:
  name: "StyleJudge v3 Full Study"
  version: "3.0.0"

# --- Dataset ---
dataset:
  streams:
    factual: 50
    non_factual: 50
  n_base_prompts: 100
  variant_types: ["V-simple", "V-abstract"]
  natural_variant_types: ["V-natural-simple", "V-natural-abstract"]
  adversarial_per_stream: 10      # 5 per variant type per stream → 20 adversarial instances total

# --- Models ---
models:
  # Dataset construction (all DeepSeek-V3 — cheap, capable)
  base_generator:              "deepseek-chat"
  style_rewriter:              "deepseek-chat"
  adversarial_injector:        "deepseek-chat"
  # Natural mode generators
  natural_simple_generator:    "deepseek-chat"
  natural_abstract_generator:  "deepseek-reasoner"   # R1; think block stripped
  # Judges
  judges:
    claude:   "claude-sonnet-4-6"
    gpt4o:    "gpt-4o"
    llama70b: "llama-3.3-70b-versatile"
  # Pairwise judges (Llama excluded: Groq 6k TPM too low for long pairwise prompts)
  pairwise_judges: ["claude", "gpt4o"]

# --- Temperature ---
temperature:
  generation:  0.3       # some variability for richer base responses
  rewriting:   0.3
  natural:     0.7       # higher for diverse natural outputs
  evaluation:  0.0       # deterministic judge scoring
  pairwise:    0.0
  adversarial: 0.0

# --- Token Limits ---
max_tokens:
  rubric_generation:   2048
  base_generation:     2048
  style_rewrite:       2048
  natural_generation:  3072   # R1 needs room for structured final answer
  adversarial:         2048
  judge_cot:           2048
  pairwise:            1024

# --- Evaluation ---
evaluation:
  scoring_scale: [1, 2, 3, 4, 5]
  runs_per_instance: 1
  max_workers: 4
  adversarial_threshold: 2   # scores ≤ this = "error detected" for EDR calculation

# --- Rate Limits ---
rate_limits:
  anthropic: {requests_per_minute: 50,  tokens_per_minute: 40000}
  openai:    {requests_per_minute: 60,  tokens_per_minute: 60000}
  groq:      {requests_per_minute: 30,  tokens_per_minute: 6000}
  deepseek:  {requests_per_minute: 60,  tokens_per_minute: 60000}
  gemini:    {requests_per_minute: 15,  tokens_per_minute: 1000000}

# --- Retry ---
retry:
  max_retries: 3
  base_delay_seconds: 2.0
  max_consecutive_429_before_pause: 3
  pause_duration_seconds: 60

# --- Paths ---
paths:
  # Raw inputs
  base_prompts:                       "data/raw/base_prompts.json"
  rubric_nonfactual:                  "data/raw/rubric_nonfactual.json"
  # Dataset
  base_responses:                     "data/dataset/base_responses.json"
  style_variants:                     "data/dataset/style_variants.json"
  natural_variants:                   "data/dataset/natural_variants.json"
  adversarial:                        "data/dataset/adversarial.json"
  # Processed instances
  evaluation_instances:               "data/processed/evaluation_instances.json"
  evaluation_instances_natural:       "data/processed/evaluation_instances_natural.json"
  evaluation_instances_adversarial:   "data/processed/evaluation_instances_adversarial.json"
  # State & logs
  state:                              "state/experiment_state_v3.json"
  # Results
  results_evaluations:                "results/evaluations"
  results_pairwise:                   "results/pairwise"
  results_mitigation:                 "results/mitigation"
  results_mechanistic:                "results/mechanistic"
  results_analysis:                   "results/analysis"
  findings_report:                    "results/analysis/findings_v3.md"

# --- Prompts ---
prompts:
  # Dataset construction
  generate_rubric_nonfactual:          "config/prompts/generate_rubric_nonfactual.txt"
  generate_base_response:              "config/prompts/generate_base_response.txt"
  rewrite_v_simple:                    "config/prompts/rewrite_v_simple.txt"
  rewrite_v_abstract:                  "config/prompts/rewrite_v_abstract.txt"
  adversarial_inject:                  "config/prompts/adversarial_inject.txt"
  # Natural mode
  generate_natural_simple:             "config/prompts/generate_natural_response_simple.txt"
  generate_natural_abstract:           "config/prompts/generate_natural_response_abstract.txt"
  # Evaluation
  judge_rubric_factual:                "config/prompts/judge_rubric_factual.txt"
  judge_rubric_nonfactual:             "config/prompts/judge_rubric_nonfactual.txt"
  judge_pairwise:                      "config/prompts/judge_pairwise.txt"
  # Mitigation conditions
  judge_mitigation_format_agnostic:    "config/prompts/judge_mitigation_format_agnostic.txt"
  judge_mitigation_fixed_rubric:       "config/prompts/judge_fixed_rubric.txt"
